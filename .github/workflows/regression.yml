---
name: Regression Tests

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: kafka-regression-linux
  cancel-in-progress: false

jobs:
  regression:
    name: Regression Suite    
    runs-on: [self-hosted, kafka-regression]
    environment: regression
    timeout-minutes: 60
    env:
      KAFKA_VERSION: 8.1.0
      REGRESSION_LANE: linux-kafka-8.1-node-24
      REGRESSION_BASELINE_DIR: regression/artifacts/baselines
      REGRESSION_BASELINE_S3_PREFIX: kafka/regression-baselines
      REGRESSION_PERFORMANCE_MESSAGES: 5000
      REGRESSION_PERFORMANCE_SAMPLES: 5
      REGRESSION_PERFORMANCE_WARMUPS: 2
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Use supported Node.js Version
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24.x

      - name: Setup pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa
        with:
          version: 10.23.0

      - name: Restore cached dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: ~/.pnpm-store
          key: node-modules-${{ hashFiles('package.json', 'pnpm-lock.yaml') }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Start Kafka Cluster
        run: docker compose up --build --force-recreate -d --wait

      - name: Build
        run: pnpm run build

      - name: Run integrity regressions
        run: pnpm run test:integrity

      - name: Run memory regressions
        run: pnpm run test:memory

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ff717079ee2060e4bcee96c4779b553acc87447c
        with:
          role-to-assume: ${{ secrets.REGRESSION_AWS_ROLE_ARN }}
          aws-region: ${{ vars.REGRESSION_AWS_REGION }}

      - name: Download regression baseline
        run: |
          mkdir -p "$REGRESSION_BASELINE_DIR"
          baseline_key="${REGRESSION_BASELINE_S3_PREFIX}/${REGRESSION_LANE}/latest.json"
          head_output=$(aws s3api head-object --bucket "${{ secrets.REGRESSION_BASELINE_BUCKET }}" --key "$baseline_key" 2>&1) || head_status=$?

          if [ "${head_status:-0}" -eq 0 ]; then
            aws s3 cp \
              "s3://${{ secrets.REGRESSION_BASELINE_BUCKET }}/${baseline_key}" \
              "${REGRESSION_BASELINE_DIR}/${REGRESSION_LANE}.json"
          elif [[ "$head_output" == *"Not Found"* || "$head_output" == *"404"* || "$head_output" == *"NoSuchKey"* ]]; then
            echo "::warning::No previous regression baseline found for ${REGRESSION_LANE}; skipping comparison."
          else
            printf '%s\n' "$head_output"
            exit "$head_status"
          fi

      - name: Clear AWS credentials
        run: |
          {
            printf 'AWS_ACCESS_KEY_ID=\n'
            printf 'AWS_SECRET_ACCESS_KEY=\n'
            printf 'AWS_SESSION_TOKEN=\n'
            printf 'AWS_REGION=\n'
            printf 'AWS_DEFAULT_REGION=\n'
          } >> "$GITHUB_ENV"

      - name: Compare and update performance baseline
        run: pnpm run regression:baseline:update

      - name: Configure AWS credentials for upload
        uses: aws-actions/configure-aws-credentials@ff717079ee2060e4bcee96c4779b553acc87447c
        with:
          role-to-assume: ${{ secrets.REGRESSION_AWS_ROLE_ARN }}
          aws-region: ${{ vars.REGRESSION_AWS_REGION }}

      - name: Upload regression baseline
        run: |
          aws s3 cp \
            "${REGRESSION_BASELINE_DIR}/${REGRESSION_LANE}.json" \
            "s3://${{ secrets.REGRESSION_BASELINE_BUCKET }}/${REGRESSION_BASELINE_S3_PREFIX}/${REGRESSION_LANE}/latest.json"
          aws s3 cp \
            "${REGRESSION_BASELINE_DIR}/${REGRESSION_LANE}.json" \
            "s3://${{ secrets.REGRESSION_BASELINE_BUCKET }}/${REGRESSION_BASELINE_S3_PREFIX}/${REGRESSION_LANE}/history/${GITHUB_SHA}.json"

      - name: Upload regression artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: regression-artifacts-${{ github.run_id }}
          path: regression/artifacts
          if-no-files-found: ignore

      - name: Stop Kafka Cluster
        if: always()
        run: docker compose down --volumes
